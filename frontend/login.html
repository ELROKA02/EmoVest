<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login EmoVest</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1a364d 0%, #10202d 50%,  #101422 100%);
        }
        #card {
            background: radial-gradient(circle at center, #1a364d 0%, #10202d 50%, #101422 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="mb-2 w-[200px] flex justify-center">
        <img src="logoEmoVest.png" alt="EmoVest Logo" class="w-full h-auto object-contain">
    </div>

    <div id="card" class=" w-full max-w-[440px] rounded-[32px] p-10 md:p-12 shadow-2xl">

        <h1 class="text-2xl font-bold text-white mb-2 leading-tight text-center">
            Inicia sesión
        </h1>

        <p class="text-white text-sm mb-8 text-center px-4">
            Ingresa tus credenciales para acceder a tu cuenta de EmoVest.
        </p>

        <form class="space-y-4">
            <div class="relative">
                <input 
                    type="email" 
                    placeholder="Dirección de correo" 
                    class="w-full bg-[#101422] border-b-2 border-transparent focus:border-blue-600 p-4 rounded-lg outline-none transition-all placeholder:text-gray-200 text-gray-800"
                    required
                >
            </div>

            <div class="relative">
                <input 
                    type="password" 
                    placeholder="Contraseña" 
                    class="w-full bg-[#101422] border-b-2 border-transparent focus:border-blue-600 p-4 rounded-lg outline-none transition-all placeholder:text-gray-200 text-gray-800"
                    required
                >
                <div class="text-right mt-1">
                    <a href="#" class="text-[12px] text-white hover:underline">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button 
                type="submit" 
                class="w-full bg-[#101422] text-white font-bold py-4 mt-4 rounded-full hover:bg-gray-800 active:scale-[0.98] transition-all tracking-wide text-sm uppercase"
            >
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-white">
                ¿No tienes cuenta? <a href="#" class="font-bold text-white hover:underline">Regístrate</a>
            </p>
        </div>

        <hr class="my-8 border-gray-100">

        <div class="text-[11px] text-gray-200 space-y-4 leading-relaxed text-center">
            <p><strong>EmoVest es parte de la Familia de Empresas Aliadas</strong></p>
            <p>Al continuar, aceptas nuestras Condiciones de uso y Política de privacidad.</p>
            
            <!--Nombre de patrocinadores-->
            <div class="flex flex-wrap justify-center gap-6 pt-2 opacity-40 grayscale font-black italic">
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

</body>
</html>
